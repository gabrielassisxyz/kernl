name: release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# A release is in flight per tag; never cancel a half-published release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so the changelog can diff against the previous tag.
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      # Node is needed for the goreleaser `before` hook that runs `nuxt generate`
      # to produce the web assets embedded into the binary.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
