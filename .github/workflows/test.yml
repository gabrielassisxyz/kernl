name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install bd
        run: go install github.com/gastownhall/beads@v1.0.4

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go test (integration)
        run: go test -tags=integration ./...
