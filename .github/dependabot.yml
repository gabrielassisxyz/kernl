version: 2
updates:
  # Keeps the SHA-pinned actions in .github/workflows/* current: Dependabot
  # bumps the pin and rewrites the trailing `# vX.Y.Z` comment. Without this,
  # pinned actions silently rot. Grouped into a single weekly PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Go module updates, grouped weekly. Pairs with the govulncheck CI job.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gomod:
        patterns: ["*"]

  # Keep web dependency updates small and reviewable. Major framework/toolchain
  # migrations stay explicit because Nuxt/Vitest upgrades can carry runtime and
  # test-environment behavior changes.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
