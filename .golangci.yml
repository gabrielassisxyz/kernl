# golangci-lint v2 config.
#
# Run in CI by the `lint` job in .github/workflows/ci.yml, currently as
# ADVISORY (continue-on-error: true) because the inherited tree carries lint
# debt — at last count ~50 errcheck, ~49 unused, ~31 staticcheck, 2 ineffassign.
# Burn that down, then drop `continue-on-error` so this becomes a real gate.
#
# Locally: `golangci-lint run ./...`
version: "2"

linters:
  # Default set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  exclusions:
    generated: lax
    paths:
      - web/.output
      - web/node_modules

formatters:
  enable:
    - gofmt
